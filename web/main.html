<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>그놈목소리</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root{
    --bg-dark:#0D1B2A;
    --bg-mid:#1B263B;
    --bg-light:#E0E6ED;
    --text:#F7F9FB;
    --muted:#C5CCD6;
    --accent:#3A86FF;
    --accent-hover:#2C6AD9;
    --ring:rgba(58,134,255,.4);
    --lilac:#A29BFE;
    --surface:rgba(255,255,255,0.72);
  }

    *{ box-sizing:border-box }
    html, body{ height:100% }
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;

        background:
            linear-gradient(
                to bottom,
                #2a3a52 0%,
                #44556e 30%,
                #7a8899 70%,
                #ffffff 100%
            ),
            linear-gradient(#e0e0e0 1px, transparent 1px);
            linear-gradient(90deg, #e0e0e0 1px, transparent 1px);

        background-size: auto, 40px 40px, 40px 40px;
        background-blend-mode: normal;
        }

  .wrap{
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1200px;
    display: grid;
      grid-template-columns: 1fr 1fr;
      justify-content: center;
      align-items: center;
    gap: clamp(16px, 3vw, 32px);
    margin: 0 auto;
  }

  /* 장식 효과 */
    .fx-spot{
        position:fixed;
        inset:0;
        pointer-events:none;
        background:
    radial-gradient(
      800px 600px at 30% 25%,
      rgba(255,255,255,0.08),   /* 밝은 영역 - 약간 더 투명 */
      rgba(255,255,255,0.02) 40%,  /* 중간 단계 */
      transparent 80%          /* 끝나는 영역 더 멀리 */
    ),
    radial-gradient(
      900px 700px at 70% 75%,
      rgba(255,255,255,0.05),
      rgba(255,255,255,0.015) 50%,
      transparent 90%
    );
  mix-blend-mode: screen;
}
  .fx-grid{
    position:fixed; inset:0; pointer-events:none;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 64px 64px;
    opacity:.85;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,1));
  }
  .fx-grain{
    position:fixed; inset:0; pointer-events:none; mix-blend-mode:overlay; opacity:.2;
    background-image:url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'>\
<filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/>\
<feColorMatrix type='saturate' values='0'/><feComponentTransfer><feFuncA type='table' tableValues='0 0.05'/></feComponentTransfer></filter>\
<rect width='100%' height='100%' filter='url(#n)'/></svg>");
  }

  /* 좌측 히어로 */
  .hero{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    text-align:center;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    font-size:.82rem; letter-spacing:.12em; text-transform:uppercase; color:#E4E9F2;
    mix-blend-mode:soft-light;
  }
  .eyebrow::before{
    content:""; display:inline-block; width:36px; height:2px; background:#E4E9F2; opacity:.65;
  }

  h1{
    margin:0 0 12px;
    font-weight:900;
    letter-spacing:.04em;
    line-height:1.02;
    white-space:nowrap;
    font-size: clamp(2.6rem, 6.6vw, 5.8rem);
    color:#F9FBFA;
    text-shadow:
      0 3px 10px rgba(0,0,0,.35),
      0 0 20px rgba(255,255,255,.06);
    }
  .highlight{
    color:var(--accent);
    text-shadow:
      0 3px 10px rgba(0,0,0,.35),
      0 0 20px rgba(255,255,255,.06);
  }

  .highlight::after{content:none !important; }

  .subtitle{
    margin: 0 0 12px;
    color:#E0E6ED;
    opacity:.95;
    line-height:1.45;
    font-size: clamp(0.95rem, 1.8vw, 1.08rem);
    text-shadow: 0 1px 5px rgba(0,0,0,.25);
  }

  /* 버튼 그룹 */
  .actions{
    display:inline-flex; gap:8px; padding:3px 4px;
    background: var(--surface);
    backdrop-filter: blur(6px);
    border:1px solid rgba(255,255,255,0.22);
    border-radius:10px;
    box-shadow: 0 6px 18px rgba(0,0,0,.20);
  }
  .btn{
    appearance:none; border:none; border-radius:9px;
    width:114px; padding:8px 0;
    font-weight:800; font-size:.9rem; text-align:center; cursor:pointer;
    transition: transform .12s ease, background-color .2s ease, color .2s ease, border-color .2s ease;
  }
  .btn:active{ transform: translateY(1px) scale(.98) }
  .btn:focus-visible{ outline:3px solid var(--ring); outline-offset:2px; }
  .btn-login{ background: var(--accent); color:#fff; border:1px solid var(--accent) }
  .btn-login:hover{ background: #1F4FAF; }
  .btn-signup{ background: #fff; color: var(--accent); border:1px solid var(--accent) }
  .btn-signup:hover{ background: #1F4FAF; color:#fff }

  /* 우측 카드 */
  .panel{ display:flex; align-items:center; justify-content:center; }
  .card{
    width:100%;
    max-width: 440px;
    background: var(--surface);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,.3);
    border-radius:14px;
    padding: clamp(12px, 2vw, 16px);
    box-shadow: 0 12px 28px rgba(0,0,0,.22);
    text-align:center;
  }
  .card h3{ margin:0 0 6px; font-size:.96rem; letter-spacing:.06em; color:#1b263b; font-weight:800; }
  .card p{ margin:0; color:#2C3543; line-height:1.55; font-size:.94rem; }

  .meta{
    display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-top:10px;
  }
  .pill{
    border:1px solid var(--lilac);
    background:#fff; color:#2C3543;
    padding:6px 10px; border-radius:999px; font-size:.84rem; font-weight:600;
    box-shadow: 0 1px 0 rgba(0,0,0,.05);
  }

  @media (max-width: 960px){ .wrap{ grid-template-columns:1fr; gap:20px; } }
</style>
</head>
<body>
  <div class="fx-spot"></div>
  <div class="fx-grid"></div>
  <div class="fx-grain"></div>

  <div class="wrap">
    <!-- Hero -->
    <section class="hero">
      <div class="eyebrow">VOICE PHISHING INSIGHT</div>
      <h1>그<span class="highlight">놈</span>목소리</h1>
      <p class="subtitle">그놈의 정체를 확인해보세요</p>
      <div class="actions">
        <form action="{{ url_for('login') }}" method="get">
          <button type="submit" class="btn btn-login">로그인</button>
        </form>
        <form action="{{ url_for('signup') }}" method="get">
          <button type="submit" class="btn btn-signup">회원가입</button>
        </form>
      </div>
    </section>

    <!-- Panel -->
    <aside class="panel">
      <div class="card">
        <h3>보이스피싱 탐지, 더 간결하게</h3>
        <p>
          최소한의 인터페이스, 최대한의 명확함. 음성 업로드 후 단 몇 분 만에
          위험 신호를 요약해 드립니다.
        </p>
        <!-- <div class="meta">
          <span class="pill">실시간 판별</span>
          <span class="pill">한국어 최적화</span>
          <span class="pill">프라이버시 보호</span>
        </div> -->
      </div>
    </aside>
  </div>
</body>
</html>
