<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg-dark:#0D1B2A;
    --bg-mid:#1B263B;
    --bg-light:#E0E6ED;
    --text:#F7F9FB;

    --accent:#3A86FF;          /* 메인 액센트 */
    --accent-hover:#2C6AD9;    /* 호버 */
    --ring:rgba(58,134,255,.4);/* 포커스 링 */
    --surface:rgba(255,255,255,0.72);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    background:
        linear-gradient(
            to bottom,
            #2a3a52 0%,   /* 진한 네이비 */
            #44556e 30%,  /* 중간 네이비 */
            #7a8899 70%,  /* 연해짐 */
            #ffffff 100%  /* 흰색 */
        ),
        /* 가로선 */
        linear-gradient(#e0e0e0 1px, transparent 1px),
        /* 세로선 */
        linear-gradient(90deg, #e0e0e0 1px, transparent 1px);

    background-size: auto, 40px 40px, 40px 40px; /* 그리드 크기 맞춤 */
    background-blend-mode: normal; /* 색상 자연스럽게 섞이도록 */
}

  .card{
    width:100%; max-width:640px;
    background: var(--surface);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.30);
    box-shadow:0 12px 28px rgba(0,0,0,.22);
    border-radius:14px; padding:28px 26px;
    color:#1b263b; text-align:left;
  }

  .title{
    margin:0 0 6px; font-weight:800; letter-spacing:.06em;
    font-size:clamp(1.6rem,3.8vw,2.2rem); color:#0f1a2a;
    text-shadow: 0 1px 6px rgba(0,0,0,.20), 0 0 14px rgba(255,255,255,.06);
  }
  .subtitle{margin:0 0 18px; color:#2C3543; font-size:.98rem; line-height:1.5; text-shadow:0 1px 4px rgba(0,0,0,.12)}

  form{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .full{grid-column:1 / -1}

  label{font-weight:700; font-size:.92rem; color:#1b263b}
  input{
    width:100%; padding:12px 12px; border-radius:10px;
    border:1px solid #d7dfe8; outline:none; font-size:1rem; background:#fff; color:#0f1a2a;
    transition: box-shadow .15s ease, border-color .15s ease;
  }
  input::placeholder{ color:#9aa6b8 }
  input:focus{ border-color:#b9c6d8; box-shadow:0 0 0 4px var(--ring) }

  .actions{grid-column:1 / -1; display:flex; justify-content:center; gap:12px; margin-top:8px}

  .btn{
    appearance:none; border:none; border-radius:10px; padding:10px 0; width:150px;
    font-weight:700; font-size:.98rem; cursor:pointer; text-align:center;
    transition: transform .12s ease, background-color .2s ease, color .2s ease, border-color .2s ease;
  }
  .btn:active{transform: translateY(1px) scale(.98)}
  .btn:focus-visible{ outline:3px solid var(--ring); outline-offset:2px }

  .btn-primary{ background:var(--accent); color:#fff; border:1px solid var(--accent) }
  .btn-primary:hover{ background:var(--accent-hover) }

  .btn-ghost{ background:transparent; color:var(--accent); border:1px solid var(--accent) }
  .btn-ghost:hover{ background:var(--accent-hover); color:#fff }

  .flash{
    grid-column:1 / -1; margin:0 0 10px; padding:10px;
    border-radius:10px; background:rgba(58,134,255,.10); color:#1b263b; border:1px solid rgba(58,134,255,.25)
  }

  @media (max-width:640px){ form{grid-template-columns:1fr} }
</style>

</head>
<body>
  <div class="card" role="dialog" aria-label="회원가입">
    <h1 class="title">회원가입</h1>
    <p class="subtitle">보이스피싱 감지 서비스를 사용하려면 계정을 만들어주세요</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('do_signup') }}" method="post" autocomplete="on">
      <div>
        <label for="username">이름</label>
        <input id="username" name="username" type="text" required>
      </div>
      <div>
        <label for="phone">전화번호</label>
        <input id="phone" name="phone" type="tel" placeholder="010-1234-5678" required>
      </div>
      <div class="full">
        <label for="email">이메일</label>
        <input id="email" name="email" type="email" required>
      </div>
      <div>
        <label for="userid">아이디</label>
        <input id="userid" name="userid" type="text" required>
      </div>
      <div>
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" required>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">가입하기</button>
        <a href="{{ url_for('login') }}" class="btn btn-ghost" role="button">로그인</a>
      </div>
    </form>
  </div>
</body>
</html>
