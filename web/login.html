<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>로그인</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    :root{
      --bg-dark:#0D1B2A;      /* 딥 네이비 */
      --bg-mid:#1B263B;       /* 미드 블루-그레이 */
      --bg-light:#E0E6ED;     /* 연한 블루 그레이 */
      --text:#F7F9FB;         /* 본문 텍스트(다크 배경 위) */
      --muted:#C5CCD6;        /* 보조 텍스트 */
      --accent:#3A86FF;       /* 액센트(블루) */
      --accent-hover:#2C6AD9; /* 호버 */
      --ring:rgba(58,134,255,.4);
      --surface:rgba(255,255,255,0.72);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;

    background:
        linear-gradient(
            to bottom,
            #2a3a52 0%,   /* 진한 네이비 */
            #44556e 30%,  /* 중간 네이비 */
            #7a8899 70%,  /* 연해짐 */
            #ffffff 100%  /* 흰색 */
        ),
        /* 가로선 */
        linear-gradient(#e0e0e0 1px, transparent 1px),
        /* 세로선 */
        linear-gradient(90deg, #e0e0e0 1px, transparent 1px);

    background-size: auto, 40px 40px, 40px 40px; /* 그리드 크기 맞춤 */
    background-blend-mode: normal; /* 색상 자연스럽게 섞이도록 */
}

    /* 은은한 장식(메인 톤과 맞춤) */
    .fx-spot{
      position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(560px 360px at 30% 25%, rgba(255,255,255,0.12), transparent 60%),
        radial-gradient(680px 480px at 70% 75%, rgba(255,255,255,0.08), transparent 60%);
      mix-blend-mode: screen;
    }
    .fx-grid{
      position:fixed; inset:0; pointer-events:none;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity:.82;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.28), rgba(0,0,0,1));
    }
    .fx-grain{
      position:fixed; inset:0; pointer-events:none; mix-blend-mode:overlay; opacity:.2;
      background-image:url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'>\
<filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/>\
<feColorMatrix type='saturate' values='0'/><feComponentTransfer><feFuncA type='table' tableValues='0 0.05'/></feComponentTransfer></filter>\
<rect width='100%' height='100%' filter='url(#n)'/></svg>");
    }

    /* 카드(유리 느낌) */
    .card{
      width:100%; max-width:420px;
      background: var(--surface);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.30);
      box-shadow:0 12px 28px rgba(0,0,0,.22);
      border-radius:14px; padding:24px 22px;
      color:#1b263b;  /* 카드 내부 텍스트는 네이비 톤 */
      text-align: left;
    }

    .title{
      margin:0 0 6px; font-weight:800; letter-spacing:.06em;
      font-size: clamp(1.6rem, 3.8vw, 2.2rem);
      color:#0f1a2a;
      /* 메인과 통일: 텍스트 그림자 */
      text-shadow: 0 1px 6px rgba(0,0,0,.20), 0 0 14px rgba(255,255,255,.06);
    }

    .subtitle{
      margin:0 0 18px; color:#2C3543; font-size:.98rem; line-height: 1.5;
      text-shadow: 0 1px 4px rgba(0,0,0,.12);
    }

    form{display:flex; flex-direction:column; gap:12px; text-align:left}

    label{font-weight:700; font-size:.92rem; color:#1b263b}

    input{
      width:100%; padding:12px 12px; border-radius:10px;
      border:1px solid #d7dfe8; outline:none; font-size:1rem; background:#fff;
      transition: box-shadow .15s ease, border-color .15s ease;
      color:#0f1a2a;
    }
    input::placeholder{ color:#9aa6b8; }
    input:focus{
      border-color:#b9c6d8;
      box-shadow:0 0 0 4px rgba(58,134,255,.15); /* 블루 포커스 링 */
    }

    .actions{display:flex; justify-content:center; gap:10px; margin-top:8px}

    .btn{
      appearance:none; border:none; border-radius:10px; padding:10px 0;
      width:120px; font-weight:700; font-size:.98rem; cursor:pointer;
      transition: transform .12s ease, background-color .2s ease, color .2s ease, border-color .2s ease;
      text-align:center;
    }
    .btn:active{transform: translateY(1px) scale(.98)}
    .btn:focus-visible{ outline:3px solid var(--ring); outline-offset:2px; }

    .btn-primary{background:var(--accent); color:#fff; border:1px solid var(--accent)}
    .btn-primary:hover{background:var(--accent-hover)}

    .btn-ghost{background:transparent; color:var(--accent); border:1px solid var(--accent)}
    .btn-ghost:hover{background:var(--accent-hover); color:#fff}

    .links{margin-top:12px; font-size:.92rem; text-align:center}
    .links a{color:var(--accent); text-decoration:none}
    .links a:hover{ color: var(--accent-hover); }

    .flash{
      margin:0 0 12px; padding:10px; border-radius:10px;
      background:rgba(58,134,255,.10);
      color:#1b263b; border:1px solid rgba(58,134,255,.25);
    }
  </style>
</head>

<body>
  <div class="fx-spot" aria-hidden="true"></div>
  <div class="fx-grid" aria-hidden="true"></div>
  <div class="fx-grain" aria-hidden="true"></div>

  <div class="card" role="dialog" aria-label="로그인">
    <h1 class="title">로그인</h1>
    <p class="subtitle">그놈의 정체를 확인하려면 먼저 로그인하세요</p>

    <!-- Flask flash 메시지 -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('do_login') }}" method="post" autocomplete="on">
      <div>
        <label for="userid">아이디</label>
        <input id="userid" name="userid" type="text" required>
      </div>
      <div>
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" required>
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">로그인</button>
        <a href="{{ url_for('main') }}" class="btn btn-ghost" role="button">메인으로</a>
      </div>
    </form>

    <div class="links">
      아직 계정이 없으신가요? <a href="{{ url_for('signup') }}">회원가입</a>
    </div>
  </div>
</body>
</html>
